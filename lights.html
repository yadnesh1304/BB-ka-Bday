<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lights</title>

<style>
body {
    margin: 0;
    background: black;
    text-align: center;
    font-family: "Comic Sans MS", cursive;
    color: white;
}

/* Lights box */
.light-box {
    margin-top: 30px;
    padding: 12px 25px;
    background-color: pink;
    color: black;
    font-size: 16px;
    border-radius: 12px;
    display: inline-block;
    cursor: pointer;
    position: relative;
    z-index: 2;
}

/* Spotlight container (anchored to button) */
.spotlight {
    position: absolute;
    left: 50%;
    top: 100%; /* starts exactly from bottom of button */
    transform: translateX(-50%);
    width: 220px;
    height: 350px;

    /* cone gradient */
    background: radial-gradient(
        ellipse at top,
        rgba(255,255,255,0.7) 0%,
        rgba(255,255,255,0.4) 30%,
        rgba(255,255,255,0.1) 60%,
        transparent 80%
    );

    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
    opacity: 0;
    transition: opacity 1.2s ease-in;
    pointer-events: none;
}

/* active light */
.spotlight.active {
    opacity: 1;
}

/* Video frame */
.video-frame {
    width: 320px;
    height: 180px;
    border: 2px solid white;
    margin: 120px auto;
}
</style>
</head>

<body>

<div class="light-box" onclick="turnOnLight()">
    Lights 💡
    <div class="spotlight" id="light"></div>
</div>

<div class="video-frame"></div>

<script>
function turnOnLight() {
    document.getElementById("light").classList.add("active");
}
</script>

</body>
</html>
