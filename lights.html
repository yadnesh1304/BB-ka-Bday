<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lights</title>

<style>
body {
    margin: 0;
    background: black;
    text-align: center;
    font-family: "Comic Sans MS", cursive;
    color: white;
    overflow: hidden;
}

/* Container to control alignment */
.wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
}

/* Lights box */
.light-box {
    margin-top: 30px;
    padding: 12px 25px;
    background-color: pink;
    color: black;
    font-size: 16px;
    border-radius: 12px;
    cursor: pointer;
    position: relative;
    z-index: 2;
}

/* Proper cone spotlight */
.spotlight {
    position: absolute;
    top: 70px; /* just below button */
    left: 50%;
    transform: translateX(-50%);
    width: 300px;
    height: 400px;

    background: linear-gradient(
        to bottom,
        rgba(255,255,255,0.8),
        rgba(255,255,255,0.3),
        transparent
    );

    clip-path: polygon(50% 0%, 10% 100%, 90% 100%);
    opacity: 0;
    transition: opacity 1.2s ease-in;
    pointer-events: none;
}

/* Active */
.spotlight.active {
    opacity: 1;
}

/* Video frame */
.video-frame {
    width: 320px;
    height: 180px;
    border: 2px solid white;
    margin-top: 200px;
}
</style>
</head>

<body>

<div class="wrapper">

    <div class="light-box" onclick="turnOnLight()">Lights 💡</div>

    <div class="spotlight" id="light"></div>

    <div class="video-frame"></div>

</div>

<script>
function turnOnLight() {
    document.getElementById("light").classList.add("active");
}
</script>

</body>
</html>
