<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lights</title>

<style>
body {
    margin: 0;
    background: black;
    text-align: center;
    font-family: "Comic Sans MS", cursive;
    color: white;
    overflow: hidden;
}

/* Lights box */
.light-box {
    margin-top: 30px;
    padding: 12px 25px;
    background-color: pink;
    color: black;
    font-size: 16px;
    border-radius: 12px;
    display: inline-block;
    cursor: pointer;
    position: relative;
    z-index: 2;
}

/* Cone spotlight (narrow top → wide bottom) */
.spotlight {
    position: absolute;
    top: 80px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 400px;

    border-left: 100px solid transparent;
    border-right: 100px solid transparent;
    border-bottom: 400px solid rgba(255, 255, 255, 0.25);

    opacity: 0;
    transition: opacity 1s ease;
    pointer-events: none;
}

/* Video frame */
.video-frame {
    width: 320px;
    height: 180px;
    border: 2px solid white;
    margin: 120px auto;
    position: relative;
    z-index: 1;
}
</style>
</head>

<body>

<div class="light-box" onclick="turnOnLight()">Lights 💡</div>

<div class="spotlight" id="light"></div>

<div class="video-frame"></div>

<script>
function turnOnLight() {
    document.getElementById("light").style.opacity = "1";
}
</script>

</body>
</html>
