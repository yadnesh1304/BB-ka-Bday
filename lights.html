<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lights</title>

<style>
body {
    margin: 0;
    background: black;
    text-align: center;
    font-family: "Comic Sans MS", cursive;
    color: white;
}

.light-box {
    margin-top: 30px;
    padding: 12px 25px;
    background-color: pink;
    color: black;
    font-size: 16px;
    border-radius: 12px;
    display: inline-block;
    cursor: pointer;
}

.spotlight {
    width: 200px;
    height: 350px;
    margin: 0 auto;
    background: radial-gradient(ellipse at top, rgba(255,255,255,0.8), transparent 70%);
    opacity: 0;
    transition: 1s;
}

.video-frame {
    width: 90%;
    max-width: 600px;
    height: 340px;
    margin: 30px auto;
    display: none;
}

video {
    width: 100%;
    height: 100%;
}

.reveal-btn {
    margin: 20px auto;
    padding: 12px 25px;
    background: pink;
    color: black;
    border-radius: 12px;
    cursor: pointer;
    display: none;
}
</style>
</head>

<body>

<div class="light-box" id="btn" onclick="handleClick()">Lights 💡</div>

<div class="spotlight" id="light"></div>

<div class="video-frame" id="videoBox">
    <video id="video" poster="thumbnail.jpg">
        <source src="video.mp4" type="video/mp4">
    </video>
</div>

<div class="reveal-btn" id="afterVideoBtn" onclick="goNext()">
    Click here BB
</div>

<script>
let step = 0;

function handleClick() {
    const btn = document.getElementById("btn");
    const light = document.getElementById("light");
    const videoBox = document.getElementById("videoBox");
    const video = document.getElementById("video");

    if (step === 0) {
        light.style.opacity = "1";
        btn.innerHTML = "Camera 🎥";
        step++;
    }
    else if (step === 1) {
        videoBox.style.display = "block";
        btn.innerHTML = "Action 🎬";
        step++;
    }
    else if (step === 2) {
        video.play();
    }
}

document.getElementById("video").addEventListener("ended", function() {
    document.getElementById("afterVideoBtn").style.display = "inline-block";
});

function goNext() {
    window.location.href = "surprise.html";
}
</script>

</body>
</html>
